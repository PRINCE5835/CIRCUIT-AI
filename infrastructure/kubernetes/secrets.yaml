apiVersion: v1
kind: Secret
metadata:
  name: breadboard-secrets
type: Opaque
stringData:
  # IMPORTANT: Replace ALL values below before applying to production.
  # Generate keys with: openssl rand -hex 32
  BACKEND_SECRET_KEY: "REPLACE_WITH_SECURE_RANDOM_64_HEX_CHARS"
  JWT_SECRET_KEY: "REPLACE_WITH_SECURE_RANDOM_64_HEX_CHARS"
  DATABASE_URL: "mysql+aiomysql://breaduser:REPLACE_DB_PASS@mysql-service:3306/breadboard"
  MYSQL_ROOT_PASSWORD: "REPLACE_WITH_SECURE_ROOT_PASSWORD"
  MYSQL_PASSWORD: "REPLACE_WITH_SECURE_DB_PASSWORD"
