apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: breadboard-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: api.breadboard.ai
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: breadboard-backend
                port:
                  number: 8000
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: breadboard-ai-engine
                port:
                  number: 8001
