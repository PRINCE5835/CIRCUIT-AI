apiVersion: v1
kind: ConfigMap
metadata:
  name: breadboard-config
data:
  APP_NAME: "BreadBoard AI"
  APP_VERSION: "0.1.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  AI_ENGINE_HOST: "0.0.0.0"
  AI_ENGINE_PORT: "8001"
  WHISPER_MODEL_SIZE: "base"
  CACHE_TTL: "300"
  DATABASE_HOST: "mysql-service"
  DATABASE_PORT: "3306"
  DATABASE_NAME: "breadboard"
  DATABASE_USER: "breadboard"
