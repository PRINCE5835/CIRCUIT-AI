name: breadboard_web
description: BreadBoard AI - Web App for electronics learning.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  breadboard_shared:
    path: ../packages/shared

  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.3.0
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  intl: ^0.20.2
  responsive_framework: ^1.5.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.0.0
  audioplayers: ^5.2.1
  flutter_svg: ^2.0.9
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/sounds/
