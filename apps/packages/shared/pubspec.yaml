name: breadboard_shared
description: BreadBoard AI - Shared UI, Core, and Design System package.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Localization
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^2.4.9

  # Routing
  go_router: ^16.0.0

  # Responsive
  responsive_framework: ^1.4.0

  # Animations
  flutter_animate: ^4.5.0

  # Networking
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  uuid: ^4.2.2
  collection: ^1.18.0
  meta: ^1.11.0

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_lints: ^3.0.1
