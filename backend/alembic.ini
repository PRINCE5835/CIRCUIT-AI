[alembic]
script_location = app/db/migrations
# Override with DATABASE_URL env var in production
# MySQL: mysql+aiomysql://user:pass@host:3306/breadboard
# PostgreSQL: postgresql+asyncpg://user:pass@host:5432/breadboard
sqlalchemy.url = postgresql+asyncpg://breadboard:breadboard@localhost:5432/breadboard

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
