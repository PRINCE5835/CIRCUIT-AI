name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black isort mypy
      - run: flake8 app tests --max-line-length=100
      - run: black --check --line-length=100 app tests
      - run: isort --check-only --profile=black app tests

  lint-ai-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black isort
      - run: flake8 engine tests --max-line-length=100
      - run: black --check --line-length=100 engine tests
      - run: isort --check-only --profile=black engine tests

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: breadboard_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements/dev.txt
      - run: |
          export DATABASE_URL="mysql+aiomysql://testuser:testpass@localhost:3306/breadboard_test"
          pytest --cov=app --cov-report=xml
        env:
          DATABASE_URL: mysql+aiomysql://testuser:testpass@localhost:3306/breadboard_test
      - uses: codecov/codecov-action@v3

  test-ai-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: pytest

  test-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19"
      - run: flutter pub get
      - run: flutter test

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19"
      - run: flutter pub get
      - run: flutter test
