name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8
      - run: flake8 app tests --max-line-length=100

  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .[dev]
      - run: pytest tests/unit/ -v --tb=short

  backend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .[dev]
      - run: mypy app --ignore-missing-imports

  flutter-analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  flutter-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test test/ --no-pub

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t breadboard-backend:ci -f backend/Dockerfile backend/
      - name: Build AI engine Docker image
        run: docker build -t breadboard-ai-engine:ci -f ai-engine/Dockerfile ai-engine/
      - name: Verify Docker Compose config
        run: docker compose -f infrastructure/docker/docker-compose.yml config
