name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "ai-engine/**"
      - "infrastructure/docker/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ghcr.io/breadboard/backend:latest

      - name: Build & push AI engine image
        uses: docker/build-push-action@v5
        with:
          context: ai-engine
          push: true
          tags: ghcr.io/breadboard/ai-engine:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/breadboard
            docker-compose pull
            docker-compose up -d
