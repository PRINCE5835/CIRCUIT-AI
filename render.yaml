services:
  - type: web
    name: breadboard-backend
    runtime: python
    repo: https://github.com/your-org/breadboard-ai
    plan: free
    region: oregon
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000
      - key: BACKEND_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breadboard-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: https://your-frontend-domain.com
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: LOG_LEVEL
        value: INFO
      - key: PROMETHEUS_ENABLED
        value: false
      - key: DEBUG
        value: false

databases:
  - name: breadboard-db
    plan: free
    region: oregon
    databaseName: breadboard
    user: breadboard
    ipAllowList: []
