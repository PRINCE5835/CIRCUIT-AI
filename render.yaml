services:
  - type: web
    name: breadboard-backend
    runtime: python
    repo: https://github.com/PRINCE5835/CIRCUIT-AI
    plan: free
    region: oregon
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: cd backend && alembic upgrade head && gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000
      - key: BACKEND_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breadboard-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: https://breadboardai.vercel.app
      - key: OLLAMA_HOST
        value: https://breadboard-ai.serveousercontent.com
      - key: CIRCUIT_OLLAMA_HOST
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: PROMETHEUS_ENABLED
        value: false
      - key: DEBUG
        value: false

databases:
  - name: breadboard-db
    plan: free
    region: oregon
    databaseName: breadboard
    user: breadboard
    ipAllowList: []
